<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text font-size="15" font-weight="500" x="340" y="28" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">3 tầng bảng trong Kernel</text>
<!-- Column headers -->
<text font-size="12" font-weight="500" x="100" y="50" text-anchor="middle" fill="#185FA5" font-family="sans-serif">fd table (tầng 1)</text>
<text font-size="10" x="100" y="65" text-anchor="middle" fill="#378ADD" font-family="sans-serif">per-process, RAM</text>
<text font-size="12" font-weight="500" x="340" y="50" text-anchor="middle" fill="#534AB7" font-family="sans-serif">Open file table (tầng 2)</text>
<text font-size="10" x="340" y="65" text-anchor="middle" fill="#7F77DD" font-family="sans-serif">toàn hệ thống, RAM</text>
<text font-size="12" font-weight="500" x="570" y="50" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">Inode table (tầng 3)</text>
<text font-size="10" x="570" y="65" text-anchor="middle" fill="#1D9E75" font-family="sans-serif">trên disk</text>

<!-- Process A fd table -->
<rect x="20" y="78" width="160" height="160" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text font-size="11" font-weight="500" x="100" y="96" text-anchor="middle" fill="#0C447C" font-family="sans-serif">Process A</text>
<rect x="35" y="102" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="121" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd 0 — stdin</text>
<rect x="35" y="136" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="155" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd 1 — stdout</text>
<rect x="35" y="170" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="189" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd 2 — stderr</text>
<rect x="35" y="204" width="130" height="28" rx="4" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="11" x="100" y="223" text-anchor="middle" fill="#E6F1FB" font-family="sans-serif">fd 3 — log.txt</text>

<!-- Process B fd table -->
<rect x="20" y="258" width="160" height="110" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text font-size="11" font-weight="500" x="100" y="276" text-anchor="middle" fill="#0C447C" font-family="sans-serif">Process B</text>
<rect x="35" y="282" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="301" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd 0 — stdin</text>
<rect x="35" y="316" width="130" height="28" rx="4" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="11" x="100" y="335" text-anchor="middle" fill="#E6F1FB" font-family="sans-serif">fd 3 — log.txt</text>

<!-- Open file table entries -->
<rect x="240" y="100" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="123" text-anchor="middle" fill="#26215C" font-family="sans-serif">Entry A</text>
<text font-size="10" x="340" y="143" text-anchor="middle" fill="#534AB7" font-family="sans-serif">offset=0, O_RDONLY</text>

<rect x="240" y="180" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="203" text-anchor="middle" fill="#26215C" font-family="sans-serif">Entry B</text>
<text font-size="10" x="340" y="223" text-anchor="middle" fill="#534AB7" font-family="sans-serif">offset=128, O_WRONLY</text>

<rect x="240" y="260" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="283" text-anchor="middle" fill="#26215C" font-family="sans-serif">Entry C</text>
<text font-size="10" x="340" y="303" text-anchor="middle" fill="#534AB7" font-family="sans-serif">offset=0, O_RDWR</text>

<!-- Inode table entries -->
<rect x="480" y="100" width="180" height="76" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="570" y="123" text-anchor="middle" fill="#04342C" font-family="sans-serif">inode: log.txt</text>
<text font-size="10" x="570" y="143" text-anchor="middle" fill="#085041" font-family="sans-serif">type, size, perms</text>
<text font-size="10" x="570" y="158" text-anchor="middle" fill="#085041" font-family="sans-serif">data block ptrs</text>

<rect x="480" y="240" width="180" height="76" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="570" y="263" text-anchor="middle" fill="#04342C" font-family="sans-serif">inode: other.txt</text>
<text font-size="10" x="570" y="283" text-anchor="middle" fill="#085041" font-family="sans-serif">type, size, perms</text>
<text font-size="10" x="570" y="298" text-anchor="middle" fill="#085041" font-family="sans-serif">data block ptrs</text>

<!-- Arrows fd → open file -->
<line x1="165" y1="218" x2="238" y2="128" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="165" y1="330" x2="238" y2="208" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Arrows open file → inode -->
<line x1="440" y1="128" x2="478" y2="138" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="440" y1="208" x2="478" y2="138" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="440" y1="288" x2="478" y2="278" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Key insight -->
<rect x="20" y="390" width="640" height="50" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="5 3"/>
<text font-size="12" font-weight="500" x="340" y="412" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">Entry A và B cùng trỏ 1 inode = hard link | offset độc lập per-process</text>
<text font-size="11" x="340" y="432" text-anchor="middle" fill="#444441" font-family="sans-serif">Tầng 1,2 lưu RAM (mất khi tắt máy) | Tầng 3 lưu Disk (tồn tại vĩnh viễn)</text>
</svg>
