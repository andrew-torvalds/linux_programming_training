<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text font-size="15" font-weight="500" x="340" y="28" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">Universal I/O Model — "Mọi thứ là file"</text>
<!-- User program -->
<rect x="260" y="45" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="67" text-anchor="middle" fill="#0C447C" font-family="sans-serif">read(fd, buf, 100)</text>
<!-- Arrow down -->
<line x1="340" y1="89" x2="340" y2="119" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="11" x="360" y="109" fill="#185FA5" font-family="sans-serif">same API</text>
<!-- VFS -->
<rect x="190" y="120" width="300" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="147" text-anchor="middle" fill="#04342C" font-family="sans-serif">VFS — Virtual File System</text>
<!-- Arrows to file types -->
<line x1="220" y1="164" x2="100" y2="224" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="280" y1="164" x2="240" y2="224" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="164" x2="340" y2="224" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="164" x2="440" y2="224" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="460" y1="164" x2="580" y2="224" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- File types -->
<rect x="40" y="226" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="95" y="247" text-anchor="middle" fill="#26215C" font-family="sans-serif">Regular file</text>
<text font-size="10" x="95" y="265" text-anchor="middle" fill="#534AB7" font-family="sans-serif">ext4, FAT32</text>

<rect x="170" y="226" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="225" y="247" text-anchor="middle" fill="#26215C" font-family="sans-serif">Device file</text>
<text font-size="10" x="225" y="265" text-anchor="middle" fill="#534AB7" font-family="sans-serif">/dev/ttyUSB0</text>

<rect x="285" y="226" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="247" text-anchor="middle" fill="#26215C" font-family="sans-serif">Socket</text>
<text font-size="10" x="340" y="265" text-anchor="middle" fill="#534AB7" font-family="sans-serif">network</text>

<rect x="400" y="226" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="455" y="247" text-anchor="middle" fill="#26215C" font-family="sans-serif">Pipe</text>
<text font-size="10" x="455" y="265" text-anchor="middle" fill="#534AB7" font-family="sans-serif">IPC</text>

<rect x="525" y="226" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="580" y="247" text-anchor="middle" fill="#26215C" font-family="sans-serif">/proc</text>
<text font-size="10" x="580" y="265" text-anchor="middle" fill="#534AB7" font-family="sans-serif">virtual</text>

<!-- STM32 comparison -->
<rect x="40" y="290" width="600" height="24" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text font-size="11" x="340" y="306" text-anchor="middle" fill="#712B13" font-family="sans-serif">STM32: HAL_UART_Receive(), HAL_SPI_Receive()... — mỗi peripheral một API riêng</text>
</svg>
