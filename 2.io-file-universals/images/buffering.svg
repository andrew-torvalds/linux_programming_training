<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text font-size="15" font-weight="500" x="340" y="28" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">Buffering Pipeline</text>

<!-- Stage 1: Code -->
<rect x="220" y="45" width="240" height="50" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="65" text-anchor="middle" fill="#0C447C" font-family="sans-serif">printf() / fprintf() / fwrite()</text>
<text font-size="10" x="340" y="83" text-anchor="middle" fill="#185FA5" font-family="sans-serif">Code của bạn</text>

<!-- Arrow 1 -->
<line x1="340" y1="95" x2="340" y2="125" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="10" x="430" y="115" fill="#185FA5" font-family="sans-serif">fflush() / \n / buffer đầy</text>

<!-- Stage 2: stdio buffer -->
<rect x="180" y="128" width="320" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="148" text-anchor="middle" fill="#633806" font-family="sans-serif">stdio buffer (user space RAM)</text>
<text font-size="10" x="340" y="166" text-anchor="middle" fill="#854F0B" font-family="sans-serif">glibc quản lý — mất khi crash!</text>

<!-- Arrow 2 -->
<line x1="340" y1="178" x2="340" y2="208" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="10" x="430" y="198" fill="#BA7517" font-family="sans-serif">write() syscall</text>

<!-- Stage 3: Kernel buffer -->
<rect x="180" y="211" width="320" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="231" text-anchor="middle" fill="#26215C" font-family="sans-serif">Kernel buffer cache (RAM)</text>
<text font-size="10" x="340" y="249" text-anchor="middle" fill="#534AB7" font-family="sans-serif">kernel quản lý — mất khi mất điện!</text>

<!-- Arrow 3 -->
<line x1="340" y1="261" x2="340" y2="291" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="10" x="430" y="281" fill="#534AB7" font-family="sans-serif">fsync() / O_SYNC</text>

<!-- Stage 4: Disk -->
<rect x="220" y="294" width="240" height="35" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="316" text-anchor="middle" fill="#04342C" font-family="sans-serif">Disk — data an toàn ✅</text>

<!-- Left side labels -->
<text font-size="11" font-weight="500" x="80" y="170" text-anchor="middle" fill="#BA7517" font-family="sans-serif">fflush()</text>
<text font-size="10" x="80" y="185" text-anchor="middle" fill="#854F0B" font-family="sans-serif">flush tầng 1</text>
<line x1="110" y1="178" x2="178" y2="178" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

<text font-size="11" font-weight="500" x="80" y="252" text-anchor="middle" fill="#534AB7" font-family="sans-serif">fsync()</text>
<text font-size="10" x="80" y="267" text-anchor="middle" fill="#7F77DD" font-family="sans-serif">flush tầng 2</text>
<line x1="110" y1="261" x2="178" y2="261" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
</svg>
