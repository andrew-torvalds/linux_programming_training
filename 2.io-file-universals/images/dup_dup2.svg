<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text font-size="16" font-weight="500" x="340" y="28" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">dup() và dup2() — Nhân bản file descriptor</text>

<!-- ===== BEFORE (shared) ===== -->
<text font-size="13" font-weight="500" x="340" y="55" text-anchor="middle" fill="#888780" font-family="sans-serif">Trạng thái ban đầu</text>

<!-- fd table BEFORE -->
<rect x="20" y="65" width="160" height="130" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text font-size="12" font-weight="500" x="100" y="83" text-anchor="middle" fill="#0C447C" font-family="sans-serif">fd table</text>
<rect x="35" y="90" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="109" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd=1 (stdout)</text>
<rect x="35" y="124" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="143" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd=3 (file)</text>
<rect x="35" y="158" width="130" height="28" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text font-size="11" x="100" y="177" text-anchor="middle" fill="#5F5E5A" font-family="sans-serif">fd=4 (empty)</text>

<!-- Open file table BEFORE -->
<rect x="260" y="65" width="180" height="130" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text font-size="12" font-weight="500" x="350" y="83" text-anchor="middle" fill="#633806" font-family="sans-serif">Open file table</text>
<rect x="275" y="90" width="150" height="44" rx="4" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" x="350" y="108" text-anchor="middle" fill="#412402" font-family="sans-serif">Entry A</text>
<text font-size="10" x="350" y="124" text-anchor="middle" fill="#633806" font-family="sans-serif">terminal (stdout)</text>
<rect x="275" y="140" width="150" height="44" rx="4" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" x="350" y="158" text-anchor="middle" fill="#412402" font-family="sans-serif">Entry B</text>
<text font-size="10" x="350" y="174" text-anchor="middle" fill="#633806" font-family="sans-serif">output.txt</text>

<!-- Arrows BEFORE -->
<line x1="165" y1="104" x2="273" y2="112" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="165" y1="138" x2="273" y2="162" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Inode table BEFORE -->
<rect x="510" y="65" width="150" height="130" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text font-size="12" font-weight="500" x="585" y="83" text-anchor="middle" fill="#04342C" font-family="sans-serif">Inode table</text>
<rect x="525" y="90" width="120" height="44" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="11" x="585" y="108" text-anchor="middle" fill="#04342C" font-family="sans-serif">terminal</text>
<text font-size="10" x="585" y="124" text-anchor="middle" fill="#085041" font-family="sans-serif">character device</text>
<rect x="525" y="140" width="120" height="44" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="11" x="585" y="158" text-anchor="middle" fill="#04342C" font-family="sans-serif">output.txt</text>
<text font-size="10" x="585" y="174" text-anchor="middle" fill="#085041" font-family="sans-serif">regular file</text>

<!-- Arrows BEFORE open→inode -->
<line x1="425" y1="112" x2="523" y2="112" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="425" y1="162" x2="523" y2="162" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== DUP() SECTION ===== -->
<line x1="40" y1="210" x2="640" y2="210" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="6 3"/>
<text font-size="14" font-weight="500" x="340" y="235" text-anchor="middle" fill="#185FA5" font-family="sans-serif">① dup(fd=3) — tạo fd mới, kernel chọn số nhỏ nhất available</text>

<!-- fd table DUP -->
<rect x="20" y="248" width="160" height="145" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text font-size="12" font-weight="500" x="100" y="266" text-anchor="middle" fill="#0C447C" font-family="sans-serif">fd table</text>
<rect x="35" y="273" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="292" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd=1 (stdout)</text>
<rect x="35" y="307" width="130" height="28" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" x="100" y="326" text-anchor="middle" fill="#042C53" font-family="sans-serif">fd=3 (file)</text>
<rect x="35" y="341" width="130" height="28" rx="4" fill="#378ADD" stroke="#185FA5" stroke-width="1"/>
<text font-size="11" x="100" y="360" text-anchor="middle" fill="#E6F1FB" font-family="sans-serif">fd=4 (NEW!) ←</text>

<!-- Open file table DUP -->
<rect x="260" y="248" width="180" height="145" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text font-size="12" font-weight="500" x="350" y="266" text-anchor="middle" fill="#633806" font-family="sans-serif">Open file table</text>
<rect x="275" y="273" width="150" height="44" rx="4" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" x="350" y="291" text-anchor="middle" fill="#412402" font-family="sans-serif">Entry A — terminal</text>
<rect x="275" y="323" width="150" height="44" rx="4" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" x="350" y="341" text-anchor="middle" fill="#412402" font-family="sans-serif">Entry B — output.txt</text>
<text font-size="10" x="350" y="357" text-anchor="middle" fill="#633806" font-family="sans-serif">fd=3 và fd=4 cùng trỏ!</text>

<!-- Arrows DUP -->
<line x1="165" y1="287" x2="273" y2="295" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="165" y1="321" x2="273" y2="345" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="165" y1="355" x2="273" y2="345" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

<!-- Note DUP -->
<rect x="460" y="290" width="200" height="60" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="560" y="310" text-anchor="middle" fill="#0C447C" font-family="sans-serif">fd=3 và fd=4</text>
<text font-size="10" x="560" y="328" text-anchor="middle" fill="#185FA5" font-family="sans-serif">cùng trỏ Entry B</text>
<text font-size="10" x="560" y="344" text-anchor="middle" fill="#185FA5" font-family="sans-serif">share offset!</text>

<!-- ===== DUP2() SECTION ===== -->
<line x1="40" y1="410" x2="640" y2="410" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="6 3"/>
<text font-size="14" font-weight="500" x="340" y="435" text-anchor="middle" fill="#534AB7" font-family="sans-serif">② dup2(fd=3, 1) — redirect stdout → output.txt</text>

<!-- fd table DUP2 -->
<rect x="20" y="448" width="160" height="130" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text font-size="12" font-weight="500" x="100" y="466" text-anchor="middle" fill="#26215C" font-family="sans-serif">fd table</text>
<rect x="35" y="473" width="130" height="28" rx="4" fill="#7F77DD" stroke="#534AB7" stroke-width="1"/>
<text font-size="11" x="100" y="492" text-anchor="middle" fill="#EEEDFE" font-family="sans-serif">fd=1 → output.txt!</text>
<rect x="35" y="507" width="130" height="28" rx="4" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="11" x="100" y="526" text-anchor="middle" fill="#26215C" font-family="sans-serif">fd=3 (output.txt)</text>
<rect x="35" y="541" width="130" height="28" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text font-size="11" x="100" y="560" text-anchor="middle" fill="#5F5E5A" font-family="sans-serif">fd=4 (empty)</text>

<!-- Open file table DUP2 -->
<rect x="260" y="448" width="180" height="130" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text font-size="12" font-weight="500" x="350" y="466" text-anchor="middle" fill="#633806" font-family="sans-serif">Open file table</text>
<rect x="275" y="473" width="150" height="44" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text font-size="11" x="350" y="491" text-anchor="middle" fill="#5F5E5A" font-family="sans-serif">Entry A — terminal</text>
<text font-size="10" x="350" y="507" text-anchor="middle" fill="#888780" font-family="sans-serif">(không còn fd nào trỏ)</text>
<rect x="275" y="523" width="150" height="44" rx="4" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" x="350" y="541" text-anchor="middle" fill="#412402" font-family="sans-serif">Entry B — output.txt</text>
<text font-size="10" x="350" y="557" text-anchor="middle" fill="#633806" font-family="sans-serif">fd=1 và fd=3 cùng trỏ!</text>

<!-- Arrows DUP2 -->
<line x1="165" y1="487" x2="273" y2="545" stroke="#7F77DD" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="165" y1="521" x2="273" y2="545" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Note DUP2 -->
<rect x="460" y="470" width="200" height="80" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="560" y="490" text-anchor="middle" fill="#26215C" font-family="sans-serif">printf() ghi vào fd=1</text>
<text font-size="10" x="560" y="508" text-anchor="middle" fill="#534AB7" font-family="sans-serif">fd=1 → output.txt</text>
<text font-size="10" x="560" y="524" text-anchor="middle" fill="#534AB7" font-family="sans-serif">→ ghi vào file!</text>
<text font-size="10" x="560" y="540" text-anchor="middle" fill="#534AB7" font-family="sans-serif">Program không biết!</text>

<!-- Bottom summary -->
<rect x="20" y="598" width="640" height="80" rx="8" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 3"/>
<text font-size="12" font-weight="500" x="340" y="618" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">Tóm tắt</text>
<text font-size="11" x="50" y="638" fill="#185FA5" font-family="sans-serif">dup(oldfd)         → kernel chọn fd nhỏ nhất available, trỏ đến cùng entry</text>
<text font-size="11" x="50" y="658" fill="#534AB7" font-family="sans-serif">dup2(oldfd, newfd) → dùng đúng fd=newfd, đóng newfd cũ nếu đang mở</text>
<text font-size="11" x="50" y="675" fill="#0F6E56" font-family="sans-serif">Cả 2: chỉ thay đổi tầng 1 (fd table), không tạo entry mới ở tầng 2!</text>

</svg>
