<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- USER SPACE background -->
<rect x="20" y="20" width="640" height="180" rx="12" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="6 3" opacity="0.6"/>
<text font-size="12" font-weight="500" x="36" y="40" fill="#185FA5" font-family="sans-serif">User space</text>

<!-- User program box -->
<rect x="40" y="50" width="180" height="130" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="130" y="73" text-anchor="middle" fill="#0C447C" font-family="sans-serif">User program</text>
<text font-size="11" x="130" y="95" text-anchor="middle" fill="#185FA5" font-family="sans-serif">write(1, "Hi", 2)</text>
<text font-size="10" x="130" y="115" text-anchor="middle" fill="#378ADD" font-family="sans-serif">gọi hàm bình thường</text>

<!-- glibc wrapper box -->
<rect x="280" y="50" width="220" height="130" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="390" y="73" text-anchor="middle" fill="#26215C" font-family="sans-serif">glibc wrapper</text>
<text font-size="11" x="390" y="95" text-anchor="middle" fill="#534AB7" font-family="sans-serif">① %eax = 4 (write)</text>
<text font-size="11" x="390" y="113" text-anchor="middle" fill="#534AB7" font-family="sans-serif">② args → registers</text>
<text font-size="11" x="390" y="131" text-anchor="middle" fill="#534AB7" font-family="sans-serif">③ int 0x80</text>
<text font-size="10" x="390" y="168" text-anchor="middle" fill="#7F77DD" font-family="sans-serif">return kết quả cho user</text>

<!-- Arrow user → glibc -->
<line x1="220" y1="115" x2="278" y2="115" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="10" x="249" y="108" text-anchor="middle" fill="#185FA5" font-family="sans-serif">call</text>

<!-- Arrow glibc → user (return) -->
<path d="M280 155 L250 155 L250 135 L220 135" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="10" x="235" y="150" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">return</text>

<!-- Mode switch label -->
<line x1="20" y1="210" x2="660" y2="210" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.6"/>
<text font-size="11" x="340" y="224" text-anchor="middle" fill="#888780" font-family="sans-serif">── CPU switches to kernel mode (int 0x80 → IDT[128]) ──</text>

<!-- Arrow int 0x80 → kernel -->
<line x1="390" y1="180" x2="390" y2="238" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

<!-- KERNEL SPACE background -->
<rect x="20" y="238" width="640" height="260" rx="12" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="6 3" opacity="0.6"/>
<text font-size="12" font-weight="500" x="36" y="258" fill="#0F6E56" font-family="sans-serif">Kernel space</text>

<!-- system_call() handler -->
<rect x="40" y="268" width="200" height="100" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="140" y="289" text-anchor="middle" fill="#04342C" font-family="sans-serif">system_call()</text>
<text font-size="11" x="140" y="309" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">④ lưu registers</text>
<text font-size="11" x="140" y="327" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">⑤ kiểm tra eax hợp lệ</text>
<text font-size="11" x="140" y="345" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">⑥ tra sys_call_table</text>

<!-- sys_call_table -->
<rect x="300" y="268" width="160" height="100" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="380" y="289" text-anchor="middle" fill="#633806" font-family="sans-serif">sys_call_table[]</text>
<text font-size="11" x="380" y="310" text-anchor="middle" fill="#854F0B" font-family="sans-serif">[0] → sys_read</text>
<text font-size="11" x="380" y="328" text-anchor="middle" fill="#854F0B" font-family="sans-serif">[1] → sys_write</text>
<text font-size="11" x="380" y="346" text-anchor="middle" fill="#854F0B" font-family="sans-serif">[4] → sys_write ←</text>

<!-- sys_write handler -->
<rect x="520" y="268" width="120" height="100" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="580" y="289" text-anchor="middle" fill="#4A1B0C" font-family="sans-serif">sys_write()</text>
<text font-size="11" x="580" y="313" text-anchor="middle" fill="#993C1D" font-family="sans-serif">thực thi!</text>
<text font-size="11" x="580" y="333" text-anchor="middle" fill="#993C1D" font-family="sans-serif">ghi data vào</text>
<text font-size="11" x="580" y="351" text-anchor="middle" fill="#993C1D" font-family="sans-serif">buffer cache</text>

<!-- Arrows inside kernel -->
<line x1="240" y1="318" x2="298" y2="318" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="460" y1="318" x2="518" y2="318" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Return path -->
<path d="M580 368 L580 410 L140 410 L140 370" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="10" x="360" y="428" text-anchor="middle" fill="#534AB7" font-family="sans-serif">return value → glibc → user program</text>

<!-- IDT box -->
<rect x="40" y="390" width="180" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="130" y="410" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">IDT[128]</text>
<text font-size="11" x="130" y="430" text-anchor="middle" fill="#5F5E5A" font-family="sans-serif">→ system_call() address</text>
<text font-size="10" x="130" y="446" text-anchor="middle" fill="#888780" font-family="sans-serif">0x80 = 128 = syscall entry</text>

<!-- Step numbers -->
<text font-size="18" font-weight="500" x="256" y="108" fill="#185FA5" font-family="sans-serif" opacity="0.3">①②③</text>
<text font-size="18" font-weight="500" x="55" y="290" fill="#0F6E56" font-family="sans-serif" opacity="0.3">④⑤⑥</text>

</svg>
