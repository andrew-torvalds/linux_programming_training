<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text font-size="15" font-weight="500" x="340" y="28" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">Zombie vs Orphan process</text>

<!-- ZOMBIE side -->
<text font-size="13" font-weight="500" x="170" y="55" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">Zombie — con chết trước</text>

<rect x="60" y="65" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="130" y="83" text-anchor="middle" fill="#0C447C" font-family="sans-serif">Cha (PID=100)</text>
<text font-size="10" x="130" y="99" text-anchor="middle" fill="#185FA5" font-family="sans-serif">vẫn chạy</text>

<rect x="220" y="65" width="140" height="44" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="290" y="83" text-anchor="middle" fill="#501313" font-family="sans-serif">Con (PID=101)</text>
<text font-size="10" x="290" y="99" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">exit(0) — chết rồi</text>

<line x1="200" y1="87" x2="218" y2="87" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2"/>

<!-- Con → zombie -->
<line x1="290" y1="109" x2="290" y2="139" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="220" y="140" width="140" height="44" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text font-size="11" font-weight="500" x="290" y="158" text-anchor="middle" fill="#501313" font-family="sans-serif">ZOMBIE (Z)</text>
<text font-size="10" x="290" y="174" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">chiếm PID, chờ cha</text>

<!-- Cha không waitpid -->
<text font-size="10" x="130" y="145" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">❌ không waitpid()</text>
<text font-size="10" x="130" y="160" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">→ zombie tồn tại!</text>

<!-- Fix -->
<text font-size="10" x="130" y="190" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">✅ gọi waitpid()</text>
<line x1="200" y1="195" x2="218" y2="170" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="10" x="290" y="210" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">→ kernel xóa hoàn toàn</text>

<!-- Divider -->
<line x1="340" y1="50" x2="340" y2="300" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="5 3"/>

<!-- ORPHAN side -->
<text font-size="13" font-weight="500" x="510" y="55" text-anchor="middle" fill="#185FA5" font-family="sans-serif">Orphan — cha chết trước</text>

<rect x="400" y="65" width="140" height="44" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="470" y="83" text-anchor="middle" fill="#501313" font-family="sans-serif">Cha (PID=100)</text>
<text font-size="10" x="470" y="99" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">exit(0) — chết rồi</text>

<rect x="560" y="65" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="610" y="83" text-anchor="middle" fill="#04342C" font-family="sans-serif">Con (101)</text>
<text font-size="10" x="610" y="99" text-anchor="middle" fill="#085041" font-family="sans-serif">vẫn chạy</text>

<!-- Con → orphan -->
<line x1="610" y1="109" x2="610" y2="139" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="555" y="140" width="110" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="610" y="158" text-anchor="middle" fill="#412402" font-family="sans-serif">Orphan</text>
<text font-size="10" x="610" y="174" text-anchor="middle" fill="#633806" font-family="sans-serif">PPID = 1</text>

<!-- init nhận -->
<rect x="400" y="140" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="460" y="158" text-anchor="middle" fill="#04342C" font-family="sans-serif">init (PID=1)</text>
<text font-size="10" x="460" y="174" text-anchor="middle" fill="#085041" font-family="sans-serif">nhận làm cha mới</text>

<line x1="520" y1="162" x2="555" y2="162" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- init waitpid -->
<text font-size="10" x="510" y="210" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">✅ init tự gọi waitpid()</text>
<text font-size="10" x="510" y="225" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">→ không zombie!</text>

<!-- Summary -->
<rect x="40" y="255" width="600" height="50" rx="8" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 2"/>
<text font-size="11" font-weight="500" x="340" y="275" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">Zombie → NGUY HIỂM — developer phải xử lý bằng waitpid()</text>
<text font-size="11" x="340" y="293" text-anchor="middle" fill="#2C2C2A" font-family="sans-serif">Orphan → KHÔNG nguy hiểm — init tự xử lý | Dùng để tạo daemon</text>
</svg>
